<!-- バナー -->
{% if site.data.banner.enabled %}
<div id="banner" class="bg-green-100 text-center py-5 md:py-7 px-4 w-full fixed z-30 transition-transform duration-300">
  <div class="container mx-auto">
    <a href="{{ site.data.banner.url }}" class="text-blue-600 hover:underline font-medium flex items-center justify-center text-sm md:text-base">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 md:h-5 md:w-5 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <span class="line-clamp-1">{{ site.data.banner.title }}</span>
    </a>
  </div>
</div>

<style>
  #banner {
    top: 58px;
  }
  @media (min-width: 768px) {
    #banner {
      top: 80px;
    }
  }
</style>
<script>
  function updateBannerPosition() {
    const banner = document.getElementById('banner');
    const initialTop = window.innerWidth >= 768 ? 80 : 58;
    if (window.scrollY > initialTop) {
      banner.style.top = '0px';
    } else {
      banner.style.top = (initialTop - window.scrollY) + 'px';
    }
  }

  window.addEventListener('scroll', updateBannerPosition);
  window.addEventListener('resize', updateBannerPosition);
</script>
{% endif %}
