<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ページタイトル</title>
</head>

<body class="bg-mainwhite text-gray-800">

  <!-- ヘッダー -->
  <header class="w-full bg-white shadow-sm">
    <div class="max-w-6xl mx-auto px-4 py-4">
      <h1 class="text-xl font-bold">サイトタイトル</h1>
    </div>
  </header>

  <!-- メイン（ここは1つだけ） -->
  <main class="w-full">

    <!-- セクション① -->
    <section class="py-12 bg-mainwhite">
      <div class="max-w-6xl mx-auto px-4">

        <h2 class="text-2xl md:text-4xl font-bold text-center mb-8">
          セクションタイトル
        </h2>

        <div class="space-y-6">
          <p>
            ここに本文テキストが入ります。
          </p>
        </div>

      </div>
    </section>

    <!-- セクション②（カードなど） -->
    <section class="py-12 bg-gray-50">
      <div class="max-w-6xl mx-auto px-4">

        <h2 class="text-2xl font-bold mb-6">
          別のセクション
        </h2>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

          <div class="bg-white rounded-xl shadow p-6">
            <h3 class="font-bold mb-2">カード1</h3>
            <p>説明文</p>
          </div>

          <div class="bg-white rounded-xl shadow p-6">
            <h3 class="font-bold mb-2">カード2</h3>
            <p>説明文</p>
          </div>

          <div class="bg-white rounded-xl shadow p-6">
            <h3 class="font-bold mb-2">カード3</h3>
            <p>説明文</p>
          </div>

        </div>

      </div>
    </section>

  </main>

  <!-- フッター -->
  <footer class="bg-gray-800 text-white">
    <div class="max-w-6xl mx-auto px-4 py-6 text-sm text-center">
      © 2026 Your Project Name
    </div>
  </footer>

</body>
</html>
